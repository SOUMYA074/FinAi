<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
<defs>
  <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#8b5cf6"/>
  </linearGradient>
  <linearGradient id="gGreen" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00c896"/>
    <stop offset="100%" stop-color="#3b82f6"/>
  </linearGradient>
  <linearGradient id="gBody" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e293b"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
  <linearGradient id="gScreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="100%" stop-color="#020617"/>
  </linearGradient>
  <radialGradient id="gBg" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#0d1628"/>
    <stop offset="100%" stop-color="#060a14"/>
  </radialGradient>
  <radialGradient id="gCoin" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#fef3c7"/>
    <stop offset="60%" stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#d97706"/>
  </radialGradient>
  <radialGradient id="gAntenna" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#a5b4fc"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </radialGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- bg -->
<rect x="5" y="5" width="210" height="210" rx="48" fill="url(#gBg)"/>
<rect x="5" y="5" width="210" height="210" rx="48" fill="none" stroke="url(#gPurple)" stroke-width="1" opacity="0.35"/>
<rect x="8" y="8" width="204" height="204" rx="46" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
<!-- ambient -->
<ellipse cx="55" cy="50" rx="70" ry="50" fill="rgba(59,130,246,0.05)"/>
<ellipse cx="175" cy="185" rx="60" ry="45" fill="rgba(139,92,246,0.05)"/>
<!-- antenna shaft -->
<line x1="110" y1="58" x2="110" y2="34" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
<circle cx="110" cy="34" r="4" fill="#1e293b" stroke="url(#gPurple)" stroke-width="1.2"/>
<!-- antenna orb glow -->
<circle cx="110" cy="22" r="12" fill="url(#gPurple)" opacity="0.18" filter="url(#softglow)"/>
<!-- antenna orb -->
<circle cx="110" cy="22" r="8" fill="url(#gBg)" stroke="url(#gPurple)" stroke-width="1.5"/>
<circle cx="110" cy="22" r="4.5" fill="url(#gAntenna)" filter="url(#glow)">
  <animate attributeName="r" values="3.5;6;3.5" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="108" cy="20" r="1.8" fill="white" opacity="0.6"/>
<!-- head shadow -->
<ellipse cx="110" cy="138" rx="44" ry="6" fill="rgba(0,0,0,0.35)"/>
<!-- head body -->
<rect x="58" y="58" width="104" height="76" rx="20" fill="url(#gBody)"/>
<rect x="58" y="58" width="104" height="76" rx="20" fill="none" stroke="url(#gPurple)" stroke-width="1.4" opacity="0.65"/>
<rect x="66" y="59" width="88" height="7" rx="3.5" fill="rgba(255,255,255,0.04)"/>
<!-- ears -->
<rect x="46" y="72" width="13" height="28" rx="6.5" fill="url(#gBody)" stroke="url(#gPurple)" stroke-width="1.1" opacity="0.75"/>
<rect x="49" y="77" width="4" height="18" rx="2" fill="url(#gPurple)" opacity="0.25"/>
<rect x="161" y="72" width="13" height="28" rx="6.5" fill="url(#gBody)" stroke="url(#gPurple)" stroke-width="1.1" opacity="0.75"/>
<rect x="167" y="77" width="4" height="18" rx="2" fill="url(#gPurple)" opacity="0.25"/>
<!-- screen bezel -->
<rect x="68" y="69" width="84" height="52" rx="11" fill="#0a0f1c"/>
<!-- screen glass -->
<rect x="70" y="71" width="80" height="48" rx="9" fill="url(#gScreen)"/>
<!-- screen reflection -->
<path d="M73,73 Q88,71 102,74" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" stroke-linecap="round"/>
<!-- bars -->
<rect x="79" y="97" width="7" height="13" rx="2.5" fill="#00c896">
  <animate attributeName="height" values="8;20;11;8" dur="1.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y" values="97;85;94;97" dur="1.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
</rect>
<rect x="90" y="92" width="7" height="18" rx="2.5" fill="#22d3ee">
  <animate attributeName="height" values="13;25;15;13" dur="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y" values="92;80;90;92" dur="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
</rect>
<rect x="101" y="87" width="7" height="23" rx="2.5" fill="#3b82f6">
  <animate attributeName="height" values="17;30;20;17" dur="0.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y" values="87;74;84;87" dur="0.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
</rect>
<rect x="112" y="90" width="7" height="20" rx="2.5" fill="#8b5cf6">
  <animate attributeName="height" values="15;27;17;15" dur="1.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y" values="90;78;88;90" dur="1.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
</rect>
<rect x="123" y="94" width="7" height="16" rx="2.5" fill="#a78bfa">
  <animate attributeName="height" values="11;22;13;11" dur="1.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y" values="94;83;92;94" dur="1.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
</rect>
<rect x="134" y="97" width="7" height="13" rx="2.5" fill="#c084fc">
  <animate attributeName="height" values="8;18;10;8" dur="1.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y" values="97;87;95;97" dur="1.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
</rect>
<!-- neck -->
<rect x="100" y="134" width="20" height="12" rx="5" fill="url(#gBody)" stroke="url(#gPurple)" stroke-width="0.8" opacity="0.5"/>
<circle cx="105" cy="140" r="1.5" fill="rgba(99,102,241,0.4)"/>
<circle cx="115" cy="140" r="1.5" fill="rgba(99,102,241,0.4)"/>
<!-- chart grid -->
<line x1="28" y1="178" x2="188" y2="178" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
<line x1="28" y1="168" x2="188" y2="168" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
<!-- chart fill -->
<path d="M28,180 L50,169 L72,174 L94,158 L116,148 L138,136 L160,124 L182,112 L182,188 L28,188Z" fill="url(#gGreen)" opacity="0.09"/>
<!-- chart line -->
<polyline points="28,180 50,169 72,174 94,158 116,148 138,136 160,124 182,112" fill="none" stroke="url(#gGreen)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
<!-- chart dots -->
<circle cx="28" cy="180" r="2.5" fill="#00c896" opacity="0.7"/>
<circle cx="72" cy="174" r="2.5" fill="#22d3ee" opacity="0.7"/>
<circle cx="116" cy="148" r="2.5" fill="#3b82f6" opacity="0.8"/>
<circle cx="160" cy="124" r="2.5" fill="#8b5cf6" opacity="0.8"/>
<!-- peak dot -->
<circle cx="182" cy="112" r="5.5" fill="#8b5cf6" filter="url(#glow)">
  <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="182" cy="112" r="2.5" fill="white" opacity="0.7"/>
<!-- coin glow -->
<circle cx="38" cy="150" r="20" fill="#fbbf24" opacity="0.12" filter="url(#softglow)">
  <animate attributeName="cy" values="150;142;150" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<!-- coin body -->
<circle cx="38" cy="150" r="15" fill="url(#gCoin)">
  <animate attributeName="cy" values="150;142;150" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="38" cy="150" r="15" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.5">
  <animate attributeName="cy" values="150;142;150" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="38" cy="150" r="11" fill="none" stroke="rgba(217,119,6,0.35)" stroke-width="1">
  <animate attributeName="cy" values="150;142;150" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<!-- rupee -->
<text text-anchor="middle" font-size="13" font-weight="900" fill="#78350f" font-family="sans-serif">
  <animateTransform attributeName="transform" type="translate" values="38,155;38,147;38,155" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  &#8377;
</text>
<!-- coin shine -->
<ellipse cx="33" cy="145" rx="5" ry="3.5" fill="rgba(255,255,255,0.28)" transform="rotate(-30,33,145)">
  <animate attributeName="cy" values="145;137;145" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<!-- wordmark centered -->
<text x="110" y="202" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-1">Fin<tspan fill="url(#gPurple)">AI</tspan></text>
</svg>
